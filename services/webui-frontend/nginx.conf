server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Allow large export uploads (high-DPI PNG / full-res GIF / 10s+ WebM) to be
    # saved via POST /api/exports/save. nginx defaults to 1 MB; the backend caps
    # at EXPORT_MAX_BYTES (50 MB). Without this, large exports 413 and only the
    # client-side download fallback works.
    client_max_body_size 64m;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy backend API + WebSocket to webui-backend container
    location /api/ {
        proxy_pass http://webui-backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /ws/ {
        proxy_pass http://webui-backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400;
    }
}
