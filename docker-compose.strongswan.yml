# =====================================================================
# Override file: adds strongSwan IPsec/IKEv2 nodes (alice-ipsec, bob-ipsec)
# implementing RFC 9370 ML-KEM-768 hybrid key exchange.
#
# Apply with:
#   docker compose -f docker-compose.yml -f docker-compose.strongswan.yml \
#                   --profile ipsec up -d
# =====================================================================
name: pqcqkd

services:

  alice-ipsec:
    build:
      context: .
      dockerfile: nodes/strongswan/Dockerfile
    image: pqcqkd/strongswan:local
    container_name: alice-ipsec
    profiles: ["ipsec"]
    cap_add: [NET_ADMIN, SYS_MODULE]
    sysctls:
      net.ipv4.ip_forward: 1
      net.ipv4.conf.all.accept_redirects: 0
      net.ipv4.conf.all.send_redirects: 0
    environment:
      NODE_NAME: alice-ipsec
      LOCAL_IP: 10.30.0.20
      PEER_IP: 10.30.0.21
      LOCAL_ID: alice@pqcqkd.local
      PEER_ID: bob@pqcqkd.local
      KMS_URL: http://bb84-kme-a:8080/api/v1/keys/ALICE
      PSK_INTERVAL: ${ARNIKA_INTERVAL:-30}
    depends_on:
      bb84-kme-a:
        condition: service_healthy
    networks:
      qkd-net: {}
      wan-net:
        ipv4_address: 10.30.0.20

  bob-ipsec:
    image: pqcqkd/strongswan:local
    container_name: bob-ipsec
    profiles: ["ipsec"]
    cap_add: [NET_ADMIN, SYS_MODULE]
    sysctls:
      net.ipv4.ip_forward: 1
      net.ipv4.conf.all.accept_redirects: 0
      net.ipv4.conf.all.send_redirects: 0
    environment:
      NODE_NAME: bob-ipsec
      LOCAL_IP: 10.30.0.21
      PEER_IP: 10.30.0.20
      LOCAL_ID: bob@pqcqkd.local
      PEER_ID: alice@pqcqkd.local
      KMS_URL: http://bb84-kme-b:8080/api/v1/keys/BOB
      PSK_INTERVAL: ${ARNIKA_INTERVAL:-30}
    depends_on:
      bb84-kme-b:
        condition: service_healthy
    networks:
      qkd-net: {}
      wan-net:
        ipv4_address: 10.30.0.21
