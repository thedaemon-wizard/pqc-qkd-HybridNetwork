# ===================================================================
# Override file: adds Charlie as a trusted-node relay between Alice and Bob.
# Models the multi-hop case from the paper (§III).
# Apply with:
#   docker compose -f docker-compose.yml -f docker-compose.multihop.yml --profile multihop up -d
# ===================================================================
name: pqcqkd

services:
  charlie:
    image: pqcqkd/node-alice:local
    build:
      context: ./nodes/alice
      dockerfile: Dockerfile
    container_name: charlie
    profiles: ["multihop"]
    cap_add: [NET_ADMIN, SYS_MODULE]
    devices: ["/dev/net/tun:/dev/net/tun"]
    sysctls:
      net.ipv4.conf.all.src_valid_mark: 1
      net.ipv4.ip_forward: 1
    environment:
      NODE_NAME: charlie
      WG_IFACE: wg0
      WG_LISTEN_PORT: 51822
      WG_LOCAL_IP: 10.0.0.3
      WG_PEER_IP: 10.0.0.1
      WG_PEER_ENDPOINT: alice:51820
      ARNIKA_MODE: AtLeastQkdRequired
      ARNIKA_INTERVAL: 30s
      KMS_URL: http://bb84-kme-a:8080/api/v1/keys/CHARLIE
      LISTEN_ADDRESS: 0.0.0.0:9999
      SERVER_ADDRESS: alice:9999
      PQC_PSK_FILE: /var/lib/rosenpass/pqc.psk
    networks:
      qkd-net: {}
      wan-net:
        ipv4_address: 10.30.0.12
